<!DOCTYPE html>
<!--
  Foundry Stream Overlay — OBS Browser Source page
  -------------------------------------------------------
  Usage in OBS:
    1. Sources → Add → Browser Source
    2. URL: http://localhost:30000/modules/foundrystreamoverlay/obs-overlay.html?windowId=main
       (replace "main" with your overlay window ID if using multiple windows)
    3. Set Width/Height to match your overlay canvas size (e.g. 1920 × 1080)
    4. Check "Allow transparency"
    5. Click OK — the overlay renders live with a fully transparent background.

  No chroma key required. The page connects to Foundry using the same session
  already open in your browser and updates automatically when data changes.

  Query parameters:
    windowId   — which overlay window to render (default: "main")
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Foundry Stream Overlay — OBS</title>
  <style>
    /* Transparent background for OBS "Allow transparency" */
    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #overlay-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* ── Copy of the essential overlay styles from window-management.js ── */
    .overlay-item {
      position: absolute;
      background: none !important;
      background-color: transparent !important;
      color: inherit;
      padding: 0 !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 0 !important;
      cursor: default;
      user-select: none;
      transform-origin: center;
      box-shadow: none !important;
      backdrop-filter: none !important;
      outline: none !important;
    }

    .overlay-item:not(img) {
      text-align: center;
      min-width: 80px;
      left: 50%;
      transform: translateX(-50%);
    }

    img.overlay-item {
      transform: none;
      left: auto;
    }

    .overlay-item.text-stroked {
      paint-order: stroke fill;
    }

    @supports not (paint-order: stroke) {
      .overlay-item.text-stroked {
        text-shadow:
          -1px -1px 0 var(--stroke-color),
           1px -1px 0 var(--stroke-color),
          -1px  1px 0 var(--stroke-color),
           1px  1px 0 var(--stroke-color);
      }
    }

    .dice-item {
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
    }

    .dice-item.dice-stroked {
      paint-order: stroke fill;
      -webkit-text-stroke: 2px #000000;
    }

    /* Animations */
    @keyframes hover {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-5px); }
    }
    .overlay-item.hover:not(img) { animation: hover 2s infinite; }

    @keyframes img-hover {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    img.overlay-item.hover { animation: img-hover 2s infinite; }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.3); }
    }
    .overlay-item.pulse:not(img) { animation: pulse 1.5s infinite; }

    @keyframes img-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    img.overlay-item.pulse { animation: img-pulse 1.5s infinite; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .overlay-item.fadeIn { animation: fadeIn 0.5s forwards; }

    @keyframes slideInRight {
      from { transform: translateX(-50%) translateX(40px); opacity: 0; }
      to { transform: translateX(-50%); opacity: 1; }
    }
    .overlay-item.slideInRight:not(img) { animation: slideInRight 0.7s forwards; }

    @keyframes img-slideInRight {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    img.overlay-item.slideInRight { animation: img-slideInRight 0.7s forwards; }

    @keyframes hpDamage {
      0% { transform: translateX(-50%) scale(1); color: inherit; }
      30% { transform: translateX(-50%) scale(1.4); color: #ff3333; }
      100% { transform: translateX(-50%) scale(1); color: inherit; }
    }
    .overlay-item.hp-damage { animation: hpDamage 1.5s ease-out; }

    @keyframes hpHealing {
      0% { transform: translateX(-50%) scale(1); color: inherit; }
      30% { transform: translateX(-50%) scale(1.3); color: #33ff33; }
      100% { transform: translateX(-50%) scale(1); color: inherit; }
    }
    .overlay-item.hp-healing { animation: hpHealing 1.2s ease-out; }

    @keyframes rotate {
      0% { transform: translateX(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) rotate(360deg); }
    }
    .overlay-item.rotate:not(img) { animation: rotate 3s infinite linear; }

    @keyframes img-rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    img.overlay-item.rotate { animation: img-rotate 3s infinite linear; }

    @keyframes wiggle {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      25% { transform: translateX(-50%) rotate(-3deg); }
      75% { transform: translateX(-50%) rotate(3deg); }
    }
    .overlay-item.wiggle:not(img) { animation: wiggle 0.8s infinite ease-in-out; }

    @keyframes img-wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      75% { transform: rotate(3deg); }
    }
    img.overlay-item.wiggle { animation: img-wiggle 0.8s infinite ease-in-out; }

    @keyframes shimmer {
      0% { transform: translateX(-50%); opacity: 1; }
      50% { transform: translateX(-50%); opacity: 0.5; }
      100% { transform: translateX(-50%); opacity: 1; }
    }
    .overlay-item.shimmer:not(img) { animation: shimmer 1.5s infinite ease-in-out; }

    @keyframes img-shimmer {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    img.overlay-item.shimmer { animation: img-shimmer 1.5s infinite ease-in-out; }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
    }
    .overlay-item.breathe:not(img) { animation: breathe 3s infinite ease-in-out; }

    @keyframes img-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    img.overlay-item.breathe { animation: img-breathe 3s infinite ease-in-out; }

    @keyframes heartbeat {
      0%, 100% { transform: translateX(-50%) scale(1); }
      14% { transform: translateX(-50%) scale(1.1); }
      28% { transform: translateX(-50%) scale(1); }
      42% { transform: translateX(-50%) scale(1.1); }
      70% { transform: translateX(-50%) scale(1); }
    }
    .overlay-item.heartbeat:not(img) { animation: heartbeat 1.5s infinite; }

    @keyframes img-heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.1); }
      70% { transform: scale(1); }
    }
    img.overlay-item.heartbeat { animation: img-heartbeat 1.5s infinite; }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .overlay-item.flash { animation: flash 1s infinite; }

    @keyframes shake {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-50%) translateY(-2px); }
      20%, 40%, 60%, 80% { transform: translateX(-50%) translateY(2px); }
    }
    .overlay-item.shake:not(img) { animation: shake 0.5s infinite; }

    @keyframes img-shake {
      0%, 100% { transform: translateY(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateY(-2px); }
      20%, 40%, 60%, 80% { transform: translateY(2px); }
    }
    img.overlay-item.shake { animation: img-shake 0.5s infinite; }

    @keyframes diceFlip {
      0% { transform: translateX(-50%) scale(1); }
      25% { transform: translateX(-50%) scale(1.2) rotateY(90deg); }
      50% { transform: translateX(-50%) scale(1.1) rotateY(180deg); }
      75% { transform: translateX(-50%) scale(1.2) rotateY(270deg); }
      100% { transform: translateX(-50%) scale(1) rotateY(360deg); }
    }

    @keyframes diceLanding {
      0% { transform: translateX(-50%) scale(1); color: inherit; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
      30% { transform: translateX(-50%) scale(1.4); color: #ffdd44; filter: drop-shadow(0 0 16px rgba(255,221,68,0.8)); }
      100% { transform: translateX(-50%) scale(1); color: inherit; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
    }

    @keyframes modifierFlyIn {
      0% { transform: translateX(-50%) translateY(-20px) scale(0.5); opacity: 0; }
      50% { transform: translateX(-50%) translateY(0) scale(1.1); opacity: 1; }
      100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    }

    /* Loading / error states */
    #obs-status {
      position: fixed;
      bottom: 8px;
      right: 8px;
      font-family: monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="overlay-container"></div>
  <div id="obs-status">Connecting to Foundry…</div>

  <script type="module">
    const MODULE_ID = "foundrystreamoverlay";
    const params = new URLSearchParams(location.search);
    const windowId = params.get("windowId") || "main";
    const status = document.getElementById("obs-status");

    function setStatus(msg) {
      if (status) status.textContent = msg;
    }

    // Wait for Foundry's game object to be fully ready
    function waitForGame(maxWait = 30000) {
      return new Promise((resolve, reject) => {
        if (typeof game !== "undefined" && game.ready) {
          resolve();
          return;
        }
        const start = Date.now();
        const check = () => {
          if (typeof game !== "undefined" && game.ready) {
            resolve();
          } else if (Date.now() - start > maxWait) {
            reject(new Error("Timed out waiting for Foundry game object"));
          } else {
            setTimeout(check, 200);
          }
        };
        // Also listen for the ready hook if Hooks is already available
        if (typeof Hooks !== "undefined") {
          Hooks.once("ready", () => resolve());
        }
        check();
      });
    }

    async function init() {
      try {
        setStatus("Waiting for Foundry…");
        await waitForGame();

        setStatus("Loading overlay…");

        // Import the shared rendering function
        const { renderOverlayContent } = await import(
          `/modules/${MODULE_ID}/js/overlay/window-management.js`
        );

        const container = document.getElementById("overlay-container");

        function render() {
          try {
            renderOverlayContent(container, windowId, document);
          } catch (err) {
            console.error(`${MODULE_ID} | OBS overlay render error:`, err);
          }
        }

        // Initial render
        render();
        setStatus(""); // hide status once loaded

        // Live updates: re-render whenever the module fires its data-updated hook
        Hooks.on(`${MODULE_ID}.dataUpdated`, render);

        // Also re-render on actor/token updates so HP bars stay current
        Hooks.on("updateActor", render);
        Hooks.on("updateToken", render);

      } catch (err) {
        setStatus(`Error: ${err.message}`);
        console.error(`${MODULE_ID} | OBS overlay init error:`, err);
      }
    }

    init();
  </script>
</body>
</html>
